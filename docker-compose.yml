version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_URL=http://localhost:3000
      - MAX_ROOMS=50
      - MAX_USERS_PER_ROOM=6
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    shm_size: '2gb'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  uploads:
